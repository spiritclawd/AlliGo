<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AlliGo Extension Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 40px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 32px;
    }
    
    .card {
      background: #1a1a24;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .card h2 {
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0a0a0f;
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
    }
    
    input:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    
    .checkbox-label input {
      width: 18px;
      height: 18px;
    }
    
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }
    
    .status.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }
    
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    
    .api-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      margin-top: 16px;
    }
    
    .api-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    
    .api-status-dot.error {
      background: #ef4444;
    }
    
    .api-status-text {
      font-size: 12px;
      color: #888;
    }
    
    .links {
      display: flex;
      gap: 16px;
      margin-top: 32px;
    }
    
    .links a {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
    }
    
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ AlliGo Extension</h1>
    <p class="subtitle">Configure your AI agent risk scanner</p>
    
    <div class="card">
      <h2>🔑 API Configuration</h2>
      
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your AlliGo API key">
      
      <label for="apiEndpoint">API Endpoint</label>
      <input type="text" id="apiEndpoint" value="https://api.alligo.ai">
      
      <button id="testConnection">Test Connection</button>
      
      <div class="api-status" id="apiStatus" style="display: none;">
        <div class="api-status-dot" id="statusDot"></div>
        <span class="api-status-text" id="statusText"></span>
      </div>
    </div>
    
    <div class="card">
      <h2>⚙️ Display Settings</h2>
      
      <label class="checkbox-label">
        <input type="checkbox" id="showBadges" checked>
        Show risk badges on Twitter/X
      </label>
      
      <label class="checkbox-label">
        <input type="checkbox" id="showWarnings" checked>
        Show warnings for high-risk agents
      </label>
      
      <label class="checkbox-label">
        <input type="checkbox" id="notifications">
        Desktop notifications for new claims
      </label>
      
      <label for="minGrade">Minimum grade to show badge</label>
      <select id="minGrade">
        <option value="A">A only</option>
        <option value="B">A and B</option>
        <option value="C">A, B, and C</option>
        <option value="D">A, B, C, and D</option>
        <option value="F" selected>All grades</option>
      </select>
    </div>
    
    <button id="saveSettings">Save Settings</button>
    
    <div class="status" id="saveStatus" style="display: none;"></div>
    
    <div class="links">
      <a href="https://alligo.ai" target="_blank">AlliGo Dashboard</a>
      <a href="https://alligo.ai/docs/api" target="_blank">API Docs</a>
      <a href="https://github.com/spiritclawd/AlliGo" target="_blank">GitHub</a>
    </div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
